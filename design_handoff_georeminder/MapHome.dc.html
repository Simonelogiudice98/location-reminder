<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=block" rel="stylesheet">
  <style>
    @keyframes geo-pulse { 0%{transform:translate(-50%,-50%) scale(.6);opacity:.55} 70%{opacity:0} 100%{transform:translate(-50%,-50%) scale(2.4);opacity:0} }
    @keyframes geo-drop { 0%{transform:translate(-50%,-130%);opacity:0} 60%{transform:translate(-50%,-96%)} 100%{transform:translate(-50%,-100%);opacity:1} }
  </style>
</helmet>
<div style="position:absolute;inset:0;overflow:hidden;background:#E9ECEA;font-family:Roboto,sans-serif">
  <dc-import name="MapCanvas" hint-size="100%,100%"></dc-import>

  <!-- long-press capture layer -->
  <div onPointerDown="{{ onMapDown }}" onPointerUp="{{ onMapUp }}" onPointerLeave="{{ onMapUp }}" style="position:absolute;left:0;right:0;top:0;bottom:64px;z-index:1"></div>

  <!-- pins -->
  <div style="position:absolute;left:110px;top:300px;transform:translate(-50%,-100%);z-index:2;animation:geo-drop .4s ease-out both">
    <span style="font-family:'Material Symbols Outlined';font-size:42px;line-height:1;font-variation-settings:'FILL' 1;color:#00897B;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))">location_on</span>
  </div>
  <div style="position:absolute;left:252px;top:250px;transform:translate(-50%,-100%);z-index:2;animation:geo-drop .5s ease-out both">
    <span style="font-family:'Material Symbols Outlined';font-size:42px;line-height:1;font-variation-settings:'FILL' 1;color:#00897B;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))">location_on</span>
  </div>
  <div style="position:absolute;left:300px;top:520px;transform:translate(-50%,-100%);z-index:2;animation:geo-drop .6s ease-out both">
    <span style="font-family:'Material Symbols Outlined';font-size:42px;line-height:1;font-variation-settings:'FILL' 1;color:#00695C;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))">location_on</span>
  </div>
  <div style="position:absolute;left:150px;top:648px;transform:translate(-50%,-100%);z-index:2;animation:geo-drop .7s ease-out both">
    <span style="font-family:'Material Symbols Outlined';font-size:42px;line-height:1;font-variation-settings:'FILL' 1;color:#00897B;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))">location_on</span>
  </div>

  <!-- user location -->
  <div style="position:absolute;left:198px;top:474px;z-index:2">
    <div style="position:absolute;left:0;top:0;width:54px;height:54px;border-radius:50%;background:#1A73E8;animation:geo-pulse 2.4s ease-out infinite"></div>
    <div style="position:absolute;left:0;top:0;width:18px;height:18px;border-radius:50%;background:#1A73E8;border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>
  </div>

  <!-- status bar -->
  <div style="position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:5;color:#212121">
    <span style="font-size:15px;font-weight:600;letter-spacing:.3px">9:41</span>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-family:'Material Symbols Outlined';font-size:18px;line-height:1;font-variation-settings:'FILL' 1">signal_cellular_alt</span>
      <span style="font-family:'Material Symbols Outlined';font-size:18px;line-height:1;font-variation-settings:'FILL' 1">wifi</span>
      <span style="font-family:'Material Symbols Outlined';font-size:20px;line-height:1;font-variation-settings:'FILL' 1">battery_full</span>
    </div>
  </div>

  <!-- search pill -->
  <div style="position:absolute;top:60px;left:16px;right:16px;height:48px;background:#fff;border-radius:26px;box-shadow:0 2px 8px rgba(0,0,0,.16);display:flex;align-items:center;gap:12px;padding:0 18px;z-index:4">
    <span style="font-family:'Material Symbols Outlined';font-size:22px;line-height:1;color:#757575">search</span>
    <span style="font-size:15px;color:#9AA0A6;flex:1">Cerca un luogo</span>
    <div style="width:30px;height:30px;border-radius:50%;background:#E0F2F1;display:flex;align-items:center;justify-content:center">
      <span style="font-family:'Material Symbols Outlined';font-size:18px;line-height:1;color:#00897B;font-variation-settings:'FILL' 1">person</span>
    </div>
  </div>

  <!-- recenter button -->
  <div style="position:absolute;right:16px;bottom:166px;width:44px;height:44px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:4">
    <span style="font-family:'Material Symbols Outlined';font-size:24px;line-height:1;color:#00897B">my_location</span>
  </div>

  <!-- FAB -->
  <button data-coach="fab" onClick="{{ onFab }}" style="{{ fabStyle }}">
    <span style="font-family:'Material Symbols Outlined';font-size:26px;line-height:1;color:#fff">add</span>
    <sc-if value="{{ fabExtended }}" hint-placeholder-val="{{ true }}"><span style="font-size:15px;font-weight:600;color:#fff;padding-right:6px">Aggiungi</span></sc-if>
  </button>

  <!-- bottom nav -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:64px;display:flex;background:rgba(255,255,255,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,0.06);z-index:5">
    <button onClick="{{ onTabMap }}" style="{{ tabMapStyle }}">
      <span style="font-family:'Material Symbols Outlined';font-size:24px;line-height:1;font-variation-settings:'FILL' {{ mapFill }}">map</span>
      <span style="font-size:12px;font-weight:600">Mappa</span>
    </button>
    <button data-coach="nav" onClick="{{ onTabList }}" style="{{ tabListStyle }}">
      <span style="font-family:'Material Symbols Outlined';font-size:24px;line-height:1;font-variation-settings:'FILL' {{ listFill }}">format_list_bulleted</span>
      <span style="font-size:12px;font-weight:600">Promemoria</span>
    </button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;fabExtended&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;activeTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;map&quot;,&quot;options&quot;:[&quot;map&quot;,&quot;list&quot;]},&quot;onFab&quot;:{&quot;editor&quot;:null},&quot;onTab&quot;:{&quot;editor&quot;:null},&quot;onLongPress&quot;:{&quot;editor&quot;:null}}">
class Component extends DCLogic {
  timer = null;
  onMapDown = () => {
    clearTimeout(this.timer);
    this.timer = setTimeout(() => { (this.props.onLongPress || (()=>{}))(); }, 480);
  };
  onMapUp = () => { clearTimeout(this.timer); };
  componentWillUnmount() { clearTimeout(this.timer); }

  renderVals() {
    const ext = this.props.fabExtended ?? false;
    const active = this.props.activeTab ?? 'map';
    const tab = (on) => ({
      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
      justifyContent: 'center', gap: '3px', background: 'none', border: 'none',
      cursor: 'pointer', fontFamily: 'Roboto,sans-serif',
      color: on ? '#00897B' : '#757575'
    });
    const fabStyle = {
      position: 'absolute', right: '16px', bottom: '88px', zIndex: 4,
      height: '56px', minWidth: '56px',
      padding: ext ? '0 20px 0 18px' : '0',
      width: ext ? 'auto' : '56px',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
      borderRadius: ext ? '18px' : '50%',
      background: '#00897B', border: 'none', cursor: 'pointer',
      boxShadow: '0 4px 10px rgba(0,137,123,0.4), 0 2px 4px rgba(0,0,0,0.2)',
      fontFamily: 'Roboto,sans-serif'
    };
    return {
      fabExtended: ext,
      fabStyle,
      tabMapStyle: tab(active === 'map'),
      tabListStyle: tab(active === 'list'),
      mapFill: active === 'map' ? 1 : 0,
      listFill: active === 'list' ? 1 : 0,
      onMapDown: this.onMapDown, onMapUp: this.onMapUp,
      onFab: this.props.onFab || (() => {}),
      onTabMap: () => (this.props.onTab || (()=>{}))('map'),
      onTabList: () => (this.props.onTab || (()=>{}))('list')
    };
  }
}
</script>
</body>
</html>
